<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-labelledby="title desc">
  <title id="title">WAZONEPRO logo</title>
  <desc id="desc">Vector version of the WAZONEPRO mark with a dark half-sun, stars, textured speckles, and wordmark.</desc>
  <defs>
    <linearGradient id="markFill" x1="70" y1="130" x2="405" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252520"/>
      <stop offset="0.55" stop-color="#1f1f1b"/>
      <stop offset="1" stop-color="#131311"/>
    </linearGradient>
    <linearGradient id="wordFill" x1="28" y1="319" x2="430" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#555"/>
      <stop offset="0.26" stop-color="#161616"/>
      <stop offset="0.5" stop-color="#3a3a3a"/>
      <stop offset="0.78" stop-color="#101010"/>
      <stop offset="1" stop-color="#515151"/>
    </linearGradient>
    <clipPath id="halfSunClip">
      <path d="M52 309.5a178 178 0 0 1 356 0H52Z"/>
    </clipPath>
    <filter id="softEdge" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.45" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

